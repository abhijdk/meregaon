<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTuber</title>

<style>
body {
    margin: 0;
    background: transparent;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

/* HEADER */
h1.header {
    position: fixed;
    top: 10px;
    left: 10px;
    margin: 0;
    background: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 18px;
    z-index: 999;
}

/* MAIN CONTAINER */
.container {
    padding: 20px;
    padding-top: 80px;
    padding-bottom: 120px; /* 👈 gap from footer */
    max-width: 1000px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.7);
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);

    display: flex;
    align-items: center;
    gap: 12px;
}

/* IMAGES */
.card img {
    border-radius: 10px;
    flex-shrink: 0;
}

/* TEXT */
span {
    font-size: 15px;
}

/* LINKS */
a {
    text-decoration: none;
    color: #000;
}

/* BACKGROUND IMAGE */
.creator-img {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    opacity: 0.25;
    z-index: -1;
}

/* SOCIAL BAR (FOOTER) */
.social-bar {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
}

/* ICONS */
.social-bar img {
    width: 42px;
    height: 42px;
    padding: 5px;
    background: rgba(255,255,255,0.8);
    border: 1px solid #ddd;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
}

/* PROFILE */
.profile-icon {
    width: 52px;
    height: 52px;
}

/* RESPONSIVE */
@media (max-width: 768px) {

    h1.header {
        font-size: 16px;
        padding: 6px 10px;
    }

    .container {
        padding: 15px;
        padding-top: 75px;
        padding-bottom: 120px;
    }

    .card img {
        width: 70px;
    }

    span {
        font-size: 13px;
    }

    .social-bar {
        gap: 35px;
    }
}

/* VERY SMALL DEVICES */
@media (max-width: 420px) {

    .social-bar {
        gap: 25px;
    }

    .card {
        padding: 10px;
    }

    span {
        font-size: 12px;
    }
}
</style>

</head>
