<!DOCTYPE html>

<meta charset="UTF-8">

<!-- ✅ Mobile support -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTuber</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #ffffff; /* ✅ Desktop white */
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

/* HEADER */
.header {
    position: fixed;
    top: 10px;
    left: 10px;
    margin: 0;
    background: rgba(255,255,255,0.9);
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 18px;
    z-index: 999;
}

/* BACKGROUND IMAGE (hidden on desktop) */
.creator-img {
    display: none;
}

/* SHOW IMAGE ONLY ON MOBILE + TABLET */
@media (max-width: 1024px) {

    body {
        background: transparent;
    }

    .creator-img {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.25;
        z-index: -1;
    }
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    padding-top: 80px;
    padding-bottom: 140px; /* gap before footer */
}

/* CARD */
.card {
    display: flex;
    align-items: center;
    gap: 12px;

    background: rgba(255,255,255,0.9);
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 15px;

    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);

    transition: transform 0.2s ease;
}

.card:active {
    transform: scale(0.97);
}

/* IMAGES */
.card img {
    border-radius: 10px;
    flex-shrink: 0;
}

/* TEXT */
span {
    font-size: 15px;
    word-break: break-word;
}

/* LINKS */
a {
    text-decoration: none;
    color: inherit;
}

/* SOCIAL BAR (FOOTER) */
.social-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;

    padding: 10px 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
}

/* ICONS */
.social-bar img {
    width: 40px;
    height: 40px;
    padding: 6px;

    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;

    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* PROFILE */
.profile-icon {
    width: 48px;
    height: 48px;
}

/* TABLET */
@media (max-width: 1024px) {
    .container {
        max-width: 90%;
    }

    .card img {
        width: 80px;
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .header {
        font-size: 16px;
        padding: 6px 10px;
    }

    .container {
        padding: 15px;
        padding-top: 75px;
        padding-bottom: 130px;
    }

    .card img {
        width: 70px;
    }

    span {
        font-size: 13px;
    }

    .social-bar {
        gap: 30px;
    }
}

/* SMALL MOBILE */
@media (max-width: 420px) {

    .card {
        padding: 10px;
    }

    span {
        font-size: 12px;
    }

    .social-bar {
        gap: 20px;
    }

    .social-bar img {
        width: 36px;
        height: 36px;
    }
}

</style>
</head>
