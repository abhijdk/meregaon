<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTuber</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* HEADER */
h1.header {
    position: fixed;
    top: 10px;
    left: 10px;
    margin: 0;
    background: #fff;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 18px;
    z-index: 999;
}

/* MAIN CONTAINER */
.container {
    padding: 20px;
    padding-top: 80px;
    max-width: 900px;
    margin: auto;
}

/* CARD */
.card {
    background: #fff;
    padding: 12px;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);

    display: flex;
    align-items: center;
    gap: 12px;
}

/* IMAGES RESPONSIVE */
.card img {
    border-radius: 10px;
    flex-shrink: 0;
}

/* TEXT */
span {
    font-size: 14px;
}

/* LINKS */
a {
    text-decoration: none;
    color: #000;
}

/* BACKGROUND IMAGE */
.creator-img {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 40vw;
    max-width: 350px;
    height: auto;
    object-fit: cover;
    border-radius: 8px;
    opacity: 0.25;
    z-index: -1;
}

/* SOCIAL BAR */
.social-bar {
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
}

/* ICONS */
.social-bar img {
    width: 40px;
    height: 40px;
    padding: 5px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* PROFILE */
.profile-icon {
    width: 50px;
    height: 50px;
}

/* MOBILE FIX */
@media (max-width: 600px) {

    h1.header {
        font-size: 16px;
        padding: 6px 10px;
    }

    .container {
        padding: 15px;
        padding-top: 70px;
    }

    .card {
        flex-direction: row;
        align-items: center;
    }

    .card img {
        width: 80px;
        height: auto;
    }

    span {
        font-size: 13px;
    }

    .social-bar {
        gap: 30px;
    }

    .creator-img {
        width: 60vw;
        opacity: 0.15;
    }
}
</style>

</head>
