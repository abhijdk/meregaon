<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTuber</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* FIXED HEADER */
h1.header {
    position: fixed;
    top: 10px;
    left: 10px;
    margin: 0;
    background: #fff;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 20px;
    z-index: 999;
}

/* PUSH CONTENT DOWN (1cm gap approx) */
.container {
    padding: 20px;
    padding-top: 80px;
}

/* Card */
.card {
    background: #fff;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 1px solid #eee;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

img {
    border-radius: 10px;
}

/* Links */
a {
    color: #000;
    text-decoration: none;
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

/* Background image */
.creator-img {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 400px;
    height: 700px;
    object-fit: cover;
    border-radius: 8px;
    opacity: 0.25;
}

/* SOCIAL BAR */
.social-bar {
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 70px;
}

/* ICONS */
.social-bar img {
    width: 40px;
    height: 40px;
    padding: 5px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
}

/* PROFILE ICON */
.profile-icon {
    width: 50px;
    height: 50px;
}
</style>

</head>

<body>
